<div class="about-section about-section--white">
  <div class="container">
    <p class="eyebrow">{{ config.extra.newsletter.eyebrow }}</p>
    <div class="newsletter-row">
      <h2 class="newsletter-title">{{ config.extra.newsletter.title }}</h2>
      <form class="newsletter-form" action="#" method="post">
        <div class="newsletter-form-row">
          <input class="newsletter-input" type="email" name="email" placeholder="Your email address" required>
          <button class="btn btn-primary" type="submit">{{ config.extra.newsletter.button }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
